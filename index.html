<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Collaboration Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--blue:#075ed8;--cyan:#20bfcc;--text:#0b1b3d;--muted:#667796;--line:#dce8f7;--card:#fff;--danger:#b72020}body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#effaff 0%,#dff2ff 55%,#cfeaff 100%);color:var(--text);min-height:100vh}button,input,select,textarea{font-family:inherit}.hidden{display:none!important}.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}.login-bg:before,.login-bg:after{content:'';position:absolute;border-radius:50%;background:rgba(2,113,212,.08)}.login-bg:before{width:700px;height:700px;left:-220px;bottom:-320px}.login-bg:after{width:780px;height:780px;right:-300px;top:-260px}.login-card{position:relative;z-index:1;width:100%;max-width:520px;background:rgba(255,255,255,.94);box-shadow:0 18px 55px rgba(8,65,120,.18);border-radius:20px;padding:34px;text-align:center}.brand-logo{width:116px;height:116px;object-fit:contain}.login-card h1{font-size:31px;margin:0 0 7px}.login-card p{color:var(--muted)}.btn{border:1px solid #cbd9eb;background:#fff;color:var(--text);border-radius:11px;padding:10px 16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn-primary{background:linear-gradient(135deg,var(--blue),#0756bf);border-color:var(--blue);color:#fff}.btn:disabled{opacity:.55;cursor:not-allowed}.field{text-align:left;margin-top:14px}.field label{display:block;font-size:13px;font-weight:800;margin-bottom:7px;color:#142a4c}.field input,.field select,.field textarea{width:100%;border:1px solid #d5e1ef;border-radius:11px;padding:12px 13px;background:#fff;font-size:14px;color:var(--text)}.field textarea{min-height:96px;resize:vertical;line-height:1.5}.msg{margin-top:12px;font-size:13px;color:#667796}.msg.err{color:var(--danger)}.otp-row{display:flex;gap:10px}.otp-row input{letter-spacing:4px;font-size:18px;font-weight:800;text-align:center}.footnote{font-size:12px;color:#94a1b8;margin-top:18px}.app{min-height:100vh;display:grid;grid-template-columns:260px 1fr;background:#f5faff}.sidebar{background:rgba(255,255,255,.95);border-right:1px solid var(--line);padding:24px 18px;position:sticky;top:0;height:100vh;box-shadow:8px 0 28px rgba(15,72,130,.06)}.brand{display:flex;align-items:center;gap:10px;margin-bottom:26px}.logo-sm{width:46px;height:46px;object-fit:contain}.brand strong{font-size:14px;display:block}.brand span{font-size:12px;color:var(--muted)}.nav{display:grid;gap:8px}.nav button{width:100%;text-align:left;border:none;background:transparent;padding:12px 14px;border-radius:10px;font-size:14px;color:#173057;font-weight:700;cursor:pointer}.nav button.active,.nav button:hover{background:#e8f2ff;color:#075ed8}.nav hr{border:0;border-top:1px solid var(--line);margin:12px 0}.main{min-width:0}.topbar{height:78px;background:rgba(255,255,255,.9);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:5}.page-title h2{font-size:23px}.page-title p{font-size:13px;color:var(--muted);margin-top:4px}.user{display:flex;align-items:center;gap:12px}.avatar{width:42px;height:42px;border-radius:50%;background:#b9efff;color:#075a91;font-weight:800;display:flex;align-items:center;justify-content:center}.user strong{font-size:14px}.user span{display:block;color:var(--muted);font-size:12px}.content{padding:26px 28px 40px;max-width:1260px;margin:0 auto;width:100%}.hero{background:linear-gradient(135deg,#075ed8,#20bfcc);color:#fff;border-radius:19px;padding:22px 28px;margin-bottom:22px;box-shadow:0 14px 34px rgba(8,101,190,.18)}.hero h1{font-size:28px;margin-bottom:8px}.hero p{opacity:.92}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(20,80,140,.05)}.stat b{display:block;font-size:28px;margin-bottom:4px}.stat span{font-size:13px;color:var(--muted)}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 10px 28px rgba(20,80,140,.06);margin-bottom:18px}.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}.card-head h3{font-size:18px}.card-head p{color:var(--muted);font-size:13px;margin-top:4px}.filter-bar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}.pill{border:1px solid #d5e1ef;background:#fff;border-radius:999px;padding:8px 14px;font-weight:800;font-size:13px;color:#173057;cursor:pointer}.pill.active{background:#0969d8;border-color:#0969d8;color:#fff}.pill .count{opacity:.75;margin-left:4px}.search-row{display:flex;gap:10px;margin-bottom:14px}.search-row input{flex:1;border:1px solid #d5e1ef;border-radius:12px;padding:11px 13px;font-size:14px;background:#fbfdff}.ticket-list{display:grid;gap:10px}.ticket{display:grid;grid-template-columns:150px 1fr auto;gap:14px;align-items:center;border:1px solid #dce7f5;border-radius:14px;padding:14px 16px;background:#fff;cursor:pointer}.ticket:hover{border-color:#a7ceff;background:#fbfdff}.ticket-id{font-weight:800;color:#075ed8;font-size:13px}.ticket h4{font-size:15px;margin-bottom:6px}.ticket-meta{font-size:12px;color:var(--muted);line-height:1.45}.ticket-badges{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 11px;font-size:12px;font-weight:800;white-space:nowrap}.b-wait{background:#fff1d9;color:#8d520d}.b-progress{background:#dcf8ef;color:#087653}.b-clarify{background:#efe8ff;color:#5631a9}.b-completed{background:#e7f7e1;color:#34740c}.b-overdue{background:#ffe5e5;color:#b72020}.b-closed{background:#eef2f6;color:#536173}.b-normal{background:#f2f5f9;color:#526173}.b-high{background:#fff1d9;color:#8d520d}.b-critical{background:#ffe5e5;color:#b72020}.b-low{background:#edf7ff;color:#126195}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.full{grid-column:1/-1}.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:4px}.info-box{background:#eef7ff;border:1px solid #cfe6ff;border-radius:11px;padding:13px}.info-box b{display:block;font-size:13px;margin-bottom:7px;color:#074d9e}.info-box span{font-size:13px;color:#24446f}.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}.empty{text-align:center;color:#94a1b8;padding:30px}@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.stats,.form-grid,.info-grid{grid-template-columns:1fr}.ticket{grid-template-columns:1fr}}

.modal-backdrop{position:fixed;inset:0;background:rgba(8,24,48,.46);z-index:50;display:flex;align-items:center;justify-content:center;padding:22px}.modal{width:100%;max-width:820px;max-height:88vh;overflow:auto;background:#fff;border-radius:18px;border:1px solid #dce8f7;box-shadow:0 24px 80px rgba(0,40,100,.28)}.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:22px 24px;border-bottom:1px solid #edf3fb}.modal-head h3{font-size:20px;margin:4px 0 6px}.modal-sub{font-size:13px;color:var(--muted);line-height:1.5}.modal-body{padding:22px 24px}.modal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}.modal-item{background:#f6faff;border:1px solid #dce8f7;border-radius:12px;padding:12px}.modal-item b{display:block;color:#074d9e;font-size:12px;margin-bottom:6px}.modal-item span{font-size:13px;color:#233b60;line-height:1.5}.modal-desc{background:#fff;border:1px solid #dce8f7;border-radius:12px;padding:14px;margin-top:12px}.modal-desc b{display:block;margin-bottom:8px;color:#142a4c}.modal-desc p{font-size:14px;color:#324762;line-height:1.6;white-space:pre-wrap}.modal-actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;padding:18px 24px;border-top:1px solid #edf3fb;background:#fbfdff}.icon-btn{border:none;background:#eef5ff;color:#0b3b75;border-radius:10px;width:36px;height:36px;font-size:18px;font-weight:800;cursor:pointer}.ticket-id{cursor:pointer}.ticket-id:hover{text-decoration:underline}.hint{font-size:12px;color:#8291aa;margin-top:4px}@media(max-width:700px){.modal-grid{grid-template-columns:1fr}.modal-actions{justify-content:stretch}.modal-actions .btn{width:100%}}
.discussion{margin-top:16px;border:1px solid #dce8f7;border-radius:12px;background:#fff;overflow:hidden}.discussion-head{padding:13px 14px;border-bottom:1px solid #edf3fb;font-weight:800;color:#142a4c}.comment-list{display:grid;gap:10px;padding:14px;max-height:220px;overflow:auto;background:#fbfdff}.comment{border:1px solid #e3edf8;background:#fff;border-radius:12px;padding:11px 12px}.comment-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px}.comment-author{font-weight:800;color:#0b3b75;font-size:13px}.comment-time{font-size:11px;color:#8291aa}.comment-msg{font-size:13px;color:#324762;line-height:1.5;white-space:pre-wrap}.comment-form{display:flex;gap:10px;padding:14px;border-top:1px solid #edf3fb;background:#fff}.comment-form textarea{flex:1;border:1px solid #d5e1ef;border-radius:11px;padding:11px 12px;min-height:62px;resize:vertical;font-size:13px}.comment-note{font-size:12px;color:#8291aa;padding:0 14px 12px}.comment-empty{font-size:13px;color:#8291aa;text-align:center;padding:18px}.comment-error{font-size:13px;color:#b72020;text-align:center;padding:18px}
</style>

let state={user:null,page:'dashboard',filter:'All',query:'',tickets:[]};
function api(action, params={}){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);window[cb]=(res)=>{delete window[cb];s.remove();res&&res.success!==false?resolve(res):reject(new Error(res.error||'API error'));};const q=new URLSearchParams({action,callback:cb});Object.keys(params).forEach(k=>q.set(k,params[k]));const s=document.createElement('script');s.src=API_URL+'?'+q.toString();s.onerror=()=>{delete window[cb];s.remove();reject(new Error('Connection failed'));};document.body.appendChild(s);})}
function msg(t,err=false){const el=document.getElementById('login-msg');el.textContent=t;el.className='msg '+(err?'err':'');}
async function sendOTP(){const email=document.getElementById('login-email').value.trim().toLowerCase();if(!email)return msg('Please input your email.',true);document.getElementById('send-btn').disabled=true;msg('Sending OTP...');try{await api('generateOTP',{email});msg('OTP sent. Please check your email.');document.getElementById('step-email').classList.add('hidden');document.getElementById('step-otp').classList.remove('hidden');}catch(e){msg(e.message,true)}finally{document.getElementById('send-btn').disabled=false;}}
function backEmail(){document.getElementById('step-otp').classList.add('hidden');document.getElementById('step-email').classList.remove('hidden');}
async function verifyOTP(){const email=document.getElementById('login-email').value.trim().toLowerCase();const otp=document.getElementById('login-otp').value.trim();if(!otp)return msg('Please input OTP.',true);document.getElementById('verify-btn').disabled=true;msg('Verifying...');try{const res=await api('verifyOTP',{email,otp});state.user=res.user;localStorage.setItem('hrchub_user',JSON.stringify(state.user));document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');await loadTickets();render();}catch(e){msg(e.message,true)}finally{document.getElementById('verify-btn').disabled=false;}}
function logout(){localStorage.removeItem('hrchub_user');location.reload();}
async function loadTickets(){if(!state.user)return;try{const res=await api('listTickets',{email:state.user.email,role:state.user.role});state.tickets=(res.tickets||[]).map(normalizeTicket);}catch(e){state.tickets=[];console.warn(e.message)}}
function pick(o,keys,fb=''){for(const k of keys){if(o&&o[k]!==undefined&&o[k]!==null&&String(o[k]).trim()!=='')return o[k];}return fb;}
function isAdmin(){return String(state.user&&state.user.role||'').trim().toLowerCase()==='admin';}
function normalizeTicket(t){
  if(Array.isArray(t)){
    t={
      TicketID:t[0],
      CreatedDate:t[1],
      RequesterEmail:t[2],
      Department:t[3],
      SubCategory:t[4],
      TicketType:t[5],
      Title:t[6],
      Description:t[7],
      Priority:t[8],
      PICEmail:t[9],
      Status:t[10],
      TargetDate:t[11]
    };
  }

  const id=pick(t,['TicketID','ticketId','TicketId','id','ID','ticketID']);
  const created=pick(t,['CreatedDate','createdDate','CreatedAt','createdAt','created']);
  const requesterEmail=pick(t,['RequesterEmail','requesterEmail','Requester','requester','Email','email']);
  const dept=pick(t,['Department','department','Dept','dept']);
  const sub=pick(t,['SubCategory','subCategory','Subcategory','sub_category','Sub Category','sub']);
  const type=pick(t,['TicketType','ticketType','Type','type']);
  const title=pick(t,['Title','title','TicketTitle','ticketTitle','Subject','subject']);
  const desc=pick(t,['Description','description','ExpectedOutput','expectedOutput','Desc','desc']);
  const priority=pick(t,['Priority','priority'],'Normal');
  const pic=pick(t,['PICEmail','picEmail','PIC','pic','AssignedPIC','assignedPIC']);
  const status=pick(t,['Status','status'],'Waiting PIC Confirmation');
  const target=pick(t,['TargetDate','targetDate','Target','target']);

  return {
    id:String(id||'').trim(),
    created:fmtDate(created),
    requesterEmail:String(requesterEmail||'').trim(),
    dept:String(dept||'').trim(),
    sub:String(sub||'').trim(),
    type:String(type||'').trim(),
    title:String(title||'').trim(),
    desc:String(desc||'').trim(),
    priority:String(priority||'Normal').trim(),
    pic:String(pic||'').trim(),
    status:String(status||'Waiting PIC Confirmation').trim(),
    target:fmtDate(target)
  };
}
function fmtDate(v){if(!v)return '';try{const d=new Date(v);if(isNaN(d))return String(v);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return String(v)}}
function formatDate(v){return fmtDate(v);}
function initials(email){return (email||'U').split('@')[0].split(/[._-]/).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'U'}
function render(){const u=state.user;document.getElementById('avatar').textContent=initials(u.email);document.getElementById('user-name').textContent=u.email;document.getElementById('user-role').textContent=u.role;renderNav();if(state.page==='new')renderNew();else renderDashboard();}
function renderNav(){const nav=document.getElementById('nav');let items=[['dashboard','🏠 Dashboard'],['new','＋ New Ticket'],['my','📋 My Tickets']];if(isAdmin())items=[['dashboard','🏠 Dashboard'],['new','＋ New Ticket'],['all','📋 All Tickets']];nav.innerHTML=items.map(i=>`<button class="${state.page===i[0]?'active':''}" onclick="go('${i[0]}')">${i[1]}</button>`).join('')+'<hr><button onclick="logout()">↪ Logout</button>';}
function go(p){state.page=p;render();}
function filteredTickets(){let list=state.tickets.slice();if(!isAdmin())list=list.filter(t=>String(t.requesterEmail).toLowerCase()===state.user.email);if(state.filter!=='All')list=list.filter(t=>t.status===state.filter);if(state.query){const q=state.query.toLowerCase();list=list.filter(t=>(t.id+t.title+t.dept+t.sub+t.status).toLowerCase().includes(q));}return list.reverse();}
function counts(){const c={All:state.tickets.length};STATUS.slice(1).forEach(s=>c[s]=state.tickets.filter(t=>t.status===s).length);return c;}
function renderDashboard(){document.getElementById('page-title').textContent=state.page==='all'?'All Tickets':state.page==='my'?'My Tickets':'Dashboard';document.getElementById('page-subtitle').textContent='Track collaboration tickets and ownership.';const c=counts();document.getElementById('content').innerHTML=`<div class="hero"><h1>HR Collaboration Hub</h1><p>Front-door request system for Corporate HR collaboration, ownership, and visibility.</p></div><div class="stats"><div class="stat"><b>${c.All||0}</b><span>Total Tickets</span></div><div class="stat"><b>${c['Waiting PIC Confirmation']||0}</b><span>Waiting PIC</span></div><div class="stat"><b>${c['In Progress']||0}</b><span>In Progress</span></div><div class="stat"><b>${c.Overdue||0}</b><span>Overdue</span></div></div><div class="card"><div class="card-head"><div><h3>Ticket List</h3><p>Filter and search your tickets.</p></div><button class="btn btn-primary" onclick="go('new')">+ New Ticket</button></div>${filterHtml()}<div class="search-row"><input placeholder="Search ticket..." value="${state.query}" oninput="state.query=this.value;renderDashboard()"><button class="btn" onclick="loadTickets().then(renderDashboard)">Refresh</button></div><div class="ticket-list">${ticketListHtml()}</div></div>`;}
function filterHtml(){const c=counts();return `<div class="filter-bar">${STATUS.map(s=>`<button class="pill ${state.filter===s?'active':''}" onclick="state.filter='${s}';renderDashboard()">${s}<span class="count">(${c[s]||0})</span></button>`).join('')}</div>`}
function ticketListHtml(){const list=filteredTickets();if(!list.length)return '<div class="empty">No tickets found.</div>';return list.map(t=>`<div class="ticket" onclick="showTicketDetail('${t.id}')"><div class="ticket-id">${t.id}</div><div><h4>${escapeHtml(t.title)}</h4><div class="ticket-meta">${escapeHtml(t.dept)} · ${escapeHtml(t.sub)} · PIC: ${escapeHtml(t.pic)} · Target: ${escapeHtml(t.target||'-')}</div><div class="hint">Click ticket to view details</div></div><div class="ticket-badges"><span class="badge ${statusClass(t.status)}">${t.status}</span><span class="badge ${prioClass(t.priority)}">${t.priority}</span>${isAdmin()&&t.status==='Waiting PIC Confirmation'?`<button class="btn btn-primary" onclick="event.stopPropagation();updateStatus('${t.id}','In Progress')">In Progress</button>`:''}</div></div>`).join('');}
function statusClass(s){return s==='In Progress'?'b-progress':s==='Need Clarification'?'b-clarify':s==='Completed'?'b-completed':s==='Overdue'?'b-overdue':s==='Closed'?'b-closed':'b-wait'}
function prioClass(p){return p==='High'?'b-high':p==='Critical'?'b-critical':p==='Low'?'b-low':'b-normal'}
function renderNew(){document.getElementById('page-title').textContent='New Ticket';document.getElementById('page-subtitle').textContent='Create a new collaboration request.';document.getElementById('content').innerHTML=`<div class="card"><div class="form-grid"><div class="field"><label>Department *</label><select id="f-dept" onchange="updateSubs()">${Object.keys(DEPTS).map(d=>`<option>${d}</option>`).join('')}</select></div><div class="field"><label>Sub-category *</label><select id="f-sub"></select></div><div class="field"><label>Ticket Type *</label><select id="f-type">${TYPES.map(x=>`<option>${x}</option>`).join('')}</select></div><div class="field"><label>Priority *</label><select id="f-prio">${PRIORITIES.map(x=>`<option ${x==='Normal'?'selected':''}>${x}</option>`).join('')}</select></div><div class="field full"><label>Ticket Title *</label><input id="f-title" placeholder="Example: Succession Plan Review for XYZ Group"></div><div class="field full"><label>Description / Expected Output *</label><textarea id="f-desc" placeholder="Explain what you need, expected output, context, and deadline."></textarea></div><div class="field"><label>Target Date</label><input id="f-target" type="date"></div><div class="info-grid full"><div class="info-box"><b>Auto Assigned PIC</b><span>${DEFAULT_PIC_EMAIL}</span></div><div class="info-box"><b>Status after submit</b><span>Waiting PIC Confirmation</span></div></div></div><div class="actions"><button class="btn" onclick="go('dashboard')">Cancel</button><button id="submit-ticket" class="btn btn-primary" onclick="submitTicket()">Submit Ticket</button></div><div id="form-msg" class="msg"></div></div>`;updateSubs();}
function updateSubs(){const d=document.getElementById('f-dept').value;document.getElementById('f-sub').innerHTML=DEPTS[d].subs.map(s=>`<option>${s}</option>`).join('');}
async function submitTicket(){const payload={requesterEmail:state.user.email,department:val('f-dept'),subCategory:val('f-sub'),ticketType:val('f-type'),title:val('f-title'),description:val('f-desc'),priority:val('f-prio'),targetDate:val('f-target')};if(!payload.title||!payload.description)return formMsg('Please complete title and description.',true);document.getElementById('submit-ticket').disabled=true;formMsg('Submitting ticket...');try{const res=await api('createTicket',{payload:JSON.stringify(payload)});formMsg('Ticket created: '+res.ticketId);await loadTickets();state.page='dashboard';render();}catch(e){formMsg(e.message,true)}finally{const b=document.getElementById('submit-ticket');if(b)b.disabled=false;}}
function ticketById(id){return state.tickets.find(t=>String(t.id)===String(id));}
function detailActions(t){if(!isAdmin())return '';let buttons=[];if(t.status==='Waiting PIC Confirmation')buttons.push(`<button class="btn btn-primary" onclick="updateStatus('${t.id}','In Progress',true)">Mark In Progress</button>`);if(t.status==='In Progress')buttons.push(`<button class="btn" onclick="needClarification('${t.id}')">Need Clarification</button>`,`<button class="btn btn-primary" onclick="updateStatus('${t.id}','Completed',true)">Mark Completed</button>`);if(t.status==='Need Clarification')buttons.push(`<button class="btn btn-primary" onclick="updateStatus('${t.id}','In Progress',true)">Continue In Progress</button>`);if(t.status==='Completed')buttons.push(`<button class="btn btn-primary" onclick="updateStatus('${t.id}','Closed',true)">Close Ticket</button>`);return buttons.join('');}
async function showTicketDetail(id){const t=ticketById(id);if(!t)return;const modal=document.getElementById('ticket-modal');const box=document.getElementById('ticket-modal-content');box.innerHTML=`<div class="modal-head"><div><div class="ticket-id">${escapeHtml(t.id)}</div><h3>${escapeHtml(t.title)}</h3><div class="modal-sub">${escapeHtml(t.dept)} · ${escapeHtml(t.sub)} · ${escapeHtml(t.type||'-')}</div></div><button class="icon-btn" onclick="closeTicketDetail()">×</button></div><div class="modal-body"><div class="ticket-badges" style="justify-content:flex-start;margin-bottom:14px"><span class="badge ${statusClass(t.status)}">${escapeHtml(t.status)}</span><span class="badge ${prioClass(t.priority)}">${escapeHtml(t.priority)}</span></div><div class="modal-grid"><div class="modal-item"><b>Requester</b><span>${escapeHtml(t.requesterEmail||'-')}</span></div><div class="modal-item"><b>Assigned PIC</b><span>${escapeHtml(t.pic||'-')}</span></div><div class="modal-item"><b>Target Date</b><span>${escapeHtml(t.target||'-')}</span></div><div class="modal-item"><b>Created Date</b><span>${escapeHtml(t.created||'-')}</span></div></div><div class="modal-desc"><b>Description / Expected Output</b><p>${escapeHtml(t.desc||'-')}</p></div><div class="discussion"><div class="discussion-head">Attachments</div><div id="attachment-list" class="comment-list"><div class="comment-empty">Loading attachments...</div></div><div class="comment-form"><input id="attachment-file" type="file" style="flex:1;border:1px solid #d5e1ef;border-radius:11px;padding:13px;background:#fff"><button id="attachment-upload" class="btn btn-primary" onclick="uploadAttachment('${t.id}')">Upload</button></div><div class="comment-note">For demo stability, use files up to 1 MB. Attachments are saved to Google Drive and logged in Google Sheets.</div></div><div class="discussion"><div class="discussion-head">Discussion</div><div id="comment-list" class="comment-list"><div class="comment-empty">Loading comments...</div></div><div class="comment-form"><textarea id="comment-input" placeholder="Write an update, question, clarification, or decision..."></textarea><button id="comment-send" class="btn btn-primary" onclick="addComment('${t.id}')">Send</button></div><div class="comment-note">Comments are saved to Google Sheets as the ticket discussion history.</div></div></div><div class="modal-actions"><button class="btn" onclick="closeTicketDetail()">Close</button>${detailActions(t)}</div>`;modal.classList.remove('hidden');await loadAttachments(id);await loadComments(id);}
async function loadAttachments(ticketId){const box=document.getElementById('attachment-list');if(!box)return;try{const res=await api('listAttachments',{ticketId});const attachments=res.attachments||[];box.innerHTML=attachments.length?attachments.map(attachmentHtml).join(''):'<div class="comment-empty">No attachments yet.</div>';}catch(e){box.innerHTML='<div class="comment-error">Unable to load attachments: '+escapeHtml(e.message)+'</div>';}}
function attachmentHtml(a){return `<div class="comment"><div class="comment-top"><div class="comment-author">📎 ${escapeHtml(a.fileName||'-')} <span style="color:#8291aa;font-weight:700">${escapeHtml(a.fileSizeKB||'')} KB</span></div><div class="comment-time">${escapeHtml(fmtDate(a.createdAt||''))}</div></div><div class="comment-msg"><a href="${escapeHtml(a.fileUrl||'#')}" target="_blank" rel="noopener">Open attachment</a><br><span style="color:#667796;font-size:12px">Uploaded by ${escapeHtml(a.uploadedBy||'-')}</span></div></div>`;}
function fileToBase64(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(String(reader.result||'').split(',')[1]||'');reader.onerror=()=>reject(new Error('Unable to read file.'));reader.readAsDataURL(file);});}
async function uploadAttachment(ticketId){const input=document.getElementById('attachment-file');const btn=document.getElementById('attachment-upload');const file=input&&input.files&&input.files[0];if(!file){alert('Please choose a file first.');return;}if(file.size>1024*1024){alert('For this demo version, please upload a file up to 1 MB. For larger files, we can upgrade to Google Drive Picker in the next phase.');return;}try{btn.disabled=true;btn.textContent='Uploading...';const base64=await fileToBase64(file);await api('uploadAttachment',{ticketId,uploadedBy:state.user.email,uploaderRole:state.user.role,fileName:file.name,mimeType:file.type||'application/octet-stream',base64});input.value='';await loadTickets();await loadAttachments(ticketId);await loadComments(ticketId);renderDashboard();showTicketDetail(ticketId);}catch(e){alert(e.message)}finally{if(btn){btn.disabled=false;btn.textContent='Upload';}}}
async function loadComments(ticketId){const box=document.getElementById('comment-list');if(!box)return;try{const res=await api('listComments',{ticketId});const comments=res.comments||[];box.innerHTML=comments.length?comments.map(commentHtml).join(''):'<div class="comment-empty">No discussion yet. Start the conversation here.</div>';}catch(e){box.innerHTML='<div class="comment-error">Unable to load comments: '+escapeHtml(e.message)+'</div>';}}
function commentHtml(c){return `<div class="comment"><div class="comment-top"><div class="comment-author">${escapeHtml(c.authorEmail||'-')} <span style="color:#8291aa;font-weight:700">${escapeHtml(c.authorRole||'')}</span></div><div class="comment-time">${escapeHtml(fmtDate(c.createdAt||''))}</div></div><div class="comment-msg">${escapeHtml(c.message||'')}</div></div>`;}
async function addComment(ticketId){const input=document.getElementById('comment-input');const btn=document.getElementById('comment-send');const message=(input&&input.value||'').trim();if(!message){alert('Please write a comment first.');return;}try{btn.disabled=true;await api('addComment',{ticketId,authorEmail:state.user.email,authorRole:state.user.role,message});input.value='';await loadTickets();await loadComments(ticketId);renderDashboard();showTicketDetail(ticketId);}catch(e){alert(e.message)}finally{if(btn)btn.disabled=false;}}
function closeTicketDetail(e){if(e&&e.target&&e.target.id!=='ticket-modal')return;document.getElementById('ticket-modal').classList.add('hidden');}
async function needClarification(id){const note=prompt('Write clarification request for requester:');if(note===null)return;if(!note.trim()){alert('Clarification note is required.');return;}await updateStatus(id,'Need Clarification',true,note.trim());}
async function updateStatus(id,status,keepModal=false,note=''){try{if(status==='Completed'&&!confirm('Mark this ticket as Completed?'))return;if(status==='Closed'&&!confirm('Close this ticket?'))return;await api('updateStatus',{ticketId:id,status,updatedBy:state.user.email,note});await loadTickets();renderDashboard();if(keepModal)showTicketDetail(id);}catch(e){alert(e.message)}}
function val(id){return document.getElementById(id).value.trim();}function formMsg(t,err=false){const el=document.getElementById('form-msg');el.textContent=t;el.className='msg '+(err?'err':'');}function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
(async function init(){try{const u=JSON.parse(localStorage.getItem('hrchub_user')||'null');if(u){state.user=u;document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');await loadTickets();render();}}catch(e){}})();
</script>
</body>
</html>
