<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Collaboration Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--navy:#061b3a;--blue:#0667d8;--blue2:#0a87d9;--cyan:#24c7d5;--soft:#eaf6ff;--soft2:#f4fbff;--line:#d9e7f5;--text:#0b1b35;--muted:#64748b;--green:#16a779;--orange:#f59e0b;--red:#dc2626;--purple:#7c3aed;--shadow:0 18px 45px rgba(15,49,91,.13)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;color:var(--text);background:linear-gradient(135deg,#eaf7ff 0%,#f7fcff 42%,#d8efff 100%);min-height:100vh}button,input,select,textarea{font:inherit}.hidden{display:none!important}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;background:radial-gradient(circle at 15% 75%,rgba(15,143,220,.17),transparent 36%),radial-gradient(circle at 95% 25%,rgba(36,199,213,.16),transparent 35%),linear-gradient(135deg,#eefaff,#dff3ff)}
.login-card{width:100%;max-width:540px;background:rgba(255,255,255,.94);border:1px solid rgba(185,214,238,.9);border-radius:22px;box-shadow:var(--shadow);padding:34px 38px;text-align:center}.logo{width:112px;height:auto;margin:0 auto 10px;display:block}.login-card h1{font-size:30px;letter-spacing:-.7px;margin:4px 0}.tagline{color:#58708c;font-size:15px;margin-bottom:28px}.primary-btn{width:100%;border:none;border-radius:12px;padding:14px 18px;background:linear-gradient(135deg,var(--blue),#004fb7);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 10px 22px rgba(6,103,216,.23)}.primary-btn:hover{filter:brightness(.97)}.divider{display:flex;align-items:center;gap:12px;color:#8394aa;font-size:12px;margin:24px 0 14px}.divider:before,.divider:after{content:'';height:1px;background:#e4edf6;flex:1}.demo-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.demo-btn{background:#fff;border:1px solid #d8e5f2;border-radius:10px;padding:9px 8px;color:#17345d;cursor:pointer;font-size:12px;font-weight:600}.demo-btn:hover{background:#eef6ff}.version{font-size:12px;color:#8da0b8;margin-top:18px}
.app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.sidebar{background:rgba(255,255,255,.93);border-right:1px solid var(--line);padding:22px 18px;box-shadow:8px 0 30px rgba(15,49,91,.05)}.brand{display:flex;align-items:center;gap:10px;margin-bottom:26px}.brand img{width:48px}.brand-title{font-weight:800;color:var(--blue);font-size:14px;letter-spacing:.4px}.brand-sub{font-size:12px;font-weight:700;color:#0c254c}.nav{display:grid;gap:8px}.nav-btn{border:none;background:transparent;border-radius:10px;text-align:left;padding:12px 13px;color:#17345d;cursor:pointer;font-weight:600;display:flex;gap:10px;align-items:center}.nav-btn.active,.nav-btn:hover{background:#e9f3ff;color:#0057c2}.nav-sep{height:1px;background:#e6eef7;margin:8px 0}.topbar{height:72px;background:rgba(255,255,255,.88);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:5;backdrop-filter:blur(10px)}.page-title h2{font-size:22px}.page-title p{font-size:13px;color:var(--muted);margin-top:4px}.userbox{display:flex;align-items:center;gap:12px}.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#c9f1ff;color:#075985;font-weight:800}.role-text{font-size:12px;color:var(--muted)}.logout{border:1px solid #d8e5f2;background:#fff;border-radius:9px;padding:8px 12px;cursor:pointer}.main{padding:28px;max-width:1280px;width:100%;margin:0 auto}.hero{background:linear-gradient(135deg,#0871d9,#20bfd1);color:#fff;border-radius:20px;padding:24px 28px;margin-bottom:24px;box-shadow:var(--shadow)}.hero h1{font-size:28px;margin-bottom:8px}.hero p{opacity:.92}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(15,49,91,.06)}.stat-num{font-size:30px;font-weight:800}.stat-label{font-size:13px;color:var(--muted)}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(15,49,91,.06)}.card + .card{margin-top:16px}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.section-head h3{font-size:18px}.btn{border:1px solid #d8e5f2;background:#fff;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700;color:#16365f}.btn-blue{background:linear-gradient(135deg,var(--blue),#0055bd);border-color:var(--blue);color:#fff}.btn-green{background:var(--green);border-color:var(--green);color:#fff}.btn-orange{background:var(--orange);border-color:var(--orange);color:#fff}.btn-red{background:#fff;border-color:#fecaca;color:#b91c1c}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.field{margin-bottom:16px}.field label{display:block;font-size:13px;font-weight:800;color:#1e355b;margin-bottom:7px}.field input,.field select,.field textarea{width:100%;border:1px solid #d5e3f2;border-radius:11px;padding:12px 13px;background:#fff;color:var(--text)}.field textarea{min-height:92px;resize:vertical;line-height:1.5}.hint{font-size:12px;color:var(--muted);margin-top:5px}.info-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#eef7ff;border:1px solid #cfe6ff;border-radius:13px;overflow:hidden;margin:4px 0 18px}.info-item{padding:12px 16px;border-right:1px solid #cfe6ff}.info-item:last-child{border-right:none}.info-label{font-size:12px;color:#0b61b6;font-weight:800;margin-bottom:3px}.info-value{font-size:13px;color:#17345d}.pic-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}.pic-card{background:#eef7ff;border:1px solid #d0e8ff;border-radius:12px;padding:14px}.pic-card b{display:block;font-size:13px;color:#12406f;margin-bottom:6px}.list{display:grid;gap:10px}.ticket{display:grid;grid-template-columns:110px 1fr auto;gap:14px;align-items:center;border:1px solid #e1ebf5;border-radius:14px;padding:14px;background:#fff;cursor:pointer}.ticket:hover{background:#f7fbff}.ticket-id{font-weight:800;color:#0b61b6;font-size:13px}.ticket-title{font-weight:800;margin-bottom:4px}.ticket-meta{font-size:12px;color:var(--muted)}.badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800}.b-submitted{background:#e8f0ff;color:#1d4ed8}.b-waiting{background:#fff3d6;color:#92400e}.b-progress{background:#e7f9f2;color:#047857}.b-clarify{background:#f3e8ff;color:#6d28d9}.b-completed{background:#dcfce7;color:#166534}.b-closed{background:#f1f5f9;color:#475569}.b-overdue{background:#fee2e2;color:#b91c1c}.b-priority{background:#f8fafc;color:#334155;border:1px solid #e2e8f0}.detail-grid{display:grid;grid-template-columns:1.4fr .8fr;gap:16px}.timeline{border-left:2px solid #d8e8f8;margin-left:10px;padding-left:18px;display:grid;gap:15px}.tl{position:relative;font-size:13px;line-height:1.45}.tl:before{content:'';position:absolute;left:-25px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--blue);border:2px solid #fff}.tl-time{font-size:12px;color:var(--muted);margin-top:2px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.empty{text-align:center;color:#8aa0b8;padding:36px 10px}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{padding:11px;border-bottom:1px solid #edf3fa;text-align:left;vertical-align:top}.table th{color:#46617e;background:#f7fbff}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.filter{border:1px solid #d8e5f2;background:#fff;border-radius:999px;padding:7px 13px;cursor:pointer;font-weight:700;color:#17345d}.filter.active{background:#0b61d8;color:#fff;border-color:#0b61d8}.toast{position:fixed;right:24px;bottom:24px;background:#061b3a;color:white;border-radius:12px;padding:13px 18px;box-shadow:var(--shadow);opacity:0;transform:translateY(20px);transition:.25s;z-index:99}.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.grid4,.row,.row3,.info-strip,.pic-cards,.detail-grid{grid-template-columns:1fr}.topbar{padding:0 16px}.main{padding:18px}.demo-row{grid-template-columns:1fr 1fr}}
</style>
</head>

const STATUS_LABEL={submitted:'Submitted',waiting:'Waiting PIC Confirmation',clarification:'Need Clarification',progress:'In Progress',completed:'Completed',closed:'Closed',overdue:'Overdue'};
const STATUS_CLASS={submitted:'b-submitted',waiting:'b-waiting',clarification:'b-clarify',progress:'b-progress',completed:'b-completed',closed:'b-closed',overdue:'b-overdue'};
let state={user:null,tickets:[],next:4,filter:'all'};
function seed(){if(state.tickets.length)return; const today=new Date(); const d=n=>{let x=new Date(today);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}; state.tickets=[{id:'HRC-2026-001',requester:'budi.santoso@sinarmas.co.id',requesterName:'Budi Santoso',department:'Talent Management',sub:'Succession Plan',type:'Project Request',title:'Succession Plan Review for XYZ Group',description:'Need review and validation of successor readiness for XYZ Group before calibration meeting.',expected:'Validated successor readiness summary and feedback notes.',priority:'High',target:d(5),pic:'adminTM@gmail.com',backup:'backupTM@gmail.com',team:'Talent Management Team',status:'progress',created:d(-3),updated:d(-1),notes:[{by:'Budi Santoso',text:'Ticket submitted and routed to Talent Management Team.',time:d(-3)},{by:'Admin TM',text:'Accepted by PIC and now in progress.',time:d(-1)}]},{id:'HRC-2026-002',requester:'budi.santoso@sinarmas.co.id',requesterName:'Budi Santoso',department:'Compensation & Benefit',sub:'Benchmark Request',type:'Data Request',title:'Benefit benchmark data for plantation business',description:'Request benchmark reference for benefit harmonization discussion.',expected:'Benchmark summary in Excel format.',priority:'Normal',target:d(14),pic:'adminCB@gmail.com',backup:'backupCB@gmail.com',team:'Compensation & Benefit Team',status:'waiting',created:d(-1),updated:d(-1),notes:[{by:'Budi Santoso',text:'Ticket submitted and waiting PIC confirmation.',time:d(-1)}]},{id:'HRC-2026-003',requester:'other.user@sinarmas.co.id',requesterName:'Other User',department:'Organization Effectiveness',sub:'Organization Structure',type:'Approval / Review',title:'Organization structure review for new unit',description:'Need review of proposed reporting line and position naming.',expected:'Reviewed organization structure and recommendation.',priority:'Critical',target:d(-1),pic:'adminOE@gmail.com',backup:'backupOE@gmail.com',team:'Organization Effectiveness Team',status:'overdue',created:d(-6),updated:d(-1),notes:[{by:'Other User',text:'Ticket submitted.',time:d(-6)},{by:'System',text:'Marked overdue based on SLA.',time:d(-1)}]}];}
function save(){localStorage.setItem('hrch_v1',JSON.stringify(state));} function load(){try{let s=localStorage.getItem('hrch_v1'); if(s)state=JSON.parse(s);}catch(e){}}
function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function loginAs(key){state.user=USERS[key]; seed(); save(); document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); renderShell(); showPage(state.user.role==='Management'?'management':state.user.role==='Admin HR'?'admin':'dashboard');}
function logout(){state.user=null;save();document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden')}
function renderShell(){document.getElementById('avatar').textContent=state.user.initials;document.getElementById('user-name').textContent=state.user.name;document.getElementById('user-role').textContent=state.user.role;let role=state.user.role;let nav=[['dashboard','🏠',role.startsWith('PIC')?'Assigned to Me':'My Tickets'],['new','＋','New Ticket']]; if(role==='Admin HR')nav=[['admin','🛡️','Admin Console'],['dashboard','📋','Ticket List'],['new','＋','New Ticket'],['management','📊','Dashboard']]; if(role==='Management')nav=[['management','📊','Management Dashboard'],['dashboard','📋','Ticket List']]; nav.push(['logout','↪','Logout']); document.getElementById('nav').innerHTML=nav.map(x=>x[0]==='logout'?`<div class="nav-sep"></div><button class="nav-btn" onclick="logout()">${x[1]} ${x[2]}</button>`:`<button class="nav-btn" id="nav-${x[0]}" onclick="showPage('${x[0]}')">${x[1]} ${x[2]}</button>`).join('');}
function setTitle(t,s){document.getElementById('page-title').textContent=t;document.getElementById('page-subtitle').textContent=s||'Great collaboration needs better communication.';document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); let id='nav-'+(t.includes('New')?'new':t.includes('Management')?'management':t.includes('Admin')?'admin':'dashboard'); let el=document.getElementById(id); if(el)el.classList.add('active');}
function showPage(p){['dashboard','new','detail','admin','management'].forEach(x=>document.getElementById('page-'+x).classList.add('hidden'));document.getElementById('page-'+p).classList.remove('hidden'); if(p==='dashboard')renderDashboard(); if(p==='new')renderNew(); if(p==='admin')renderAdmin(); if(p==='management')renderManagement();}
function visibleTickets(){let u=state.user;if(u.role==='Admin HR'||u.role==='Management')return state.tickets;if(u.role.startsWith('PIC'))return state.tickets.filter(t=>t.pic===u.email || (u.email==='adminTM@gmail.com'&&t.department==='Talent Management'));return state.tickets.filter(t=>t.requester===u.email);}
function counts(list){let c={total:list.length,submitted:0,waiting:0,progress:0,clarification:0,completed:0,overdue:0};list.forEach(t=>c[t.status]=(c[t.status]||0)+1);return c;}
function renderStats(list){let c=counts(list);return `<div class="grid4"><div class="stat"><div class="stat-num">${c.total}</div><div class="stat-label">Total Tickets</div></div><div class="stat"><div class="stat-num">${(c.waiting||0)+(c.submitted||0)}</div><div class="stat-label">Waiting</div></div><div class="stat"><div class="stat-num">${(c.progress||0)+(c.clarification||0)}</div><div class="stat-label">Active</div></div><div class="stat"><div class="stat-num">${c.overdue||0}</div><div class="stat-label">Overdue</div></div></div>`}
function ticketList(list){if(!list.length)return '<div class="empty">No ticket found.</div>';return `<div class="list">${list.slice().reverse().map(t=>`<div class="ticket" onclick="showDetail('${t.id}')"><div class="ticket-id">${t.id}</div><div><div class="ticket-title">${t.title}</div><div class="ticket-meta">${t.department} · ${t.sub} · PIC: ${t.team} · Target: ${fmt(t.target)}</div></div><div class="badges"><span class="badge ${STATUS_CLASS[t.status]}">${STATUS_LABEL[t.status]}</span><span class="badge b-priority">${t.priority}</span></div></div>`).join('')}</div>`}
function renderDashboard(){let list=visibleTickets();setTitle(state.user.role.startsWith('PIC')?'Assigned to Me':'My Tickets',state.user.role.startsWith('PIC')?'Tickets assigned to your function.':'Track your own collaboration tickets.');document.getElementById('page-dashboard').innerHTML=`<div class="hero"><h1>HR Collaboration Hub</h1><p>Front-door request system for Corporate HR collaboration, ownership, and visibility.</p></div>${renderStats(list)}<div class="card"><div class="section-head"><h3>${state.user.role.startsWith('PIC')?'Assigned Tickets':'My Ticket List'}</h3><button class="btn btn-blue" onclick="showPage('new')">+ New Ticket</button></div>${ticketList(list)}</div>`;}
function renderNew(){setTitle('New Ticket','Create a new collaboration request. The system will auto-assign PIC based on department.');let deps=Object.keys(DEPARTMENTS);let dep=deps[0];document.getElementById('page-new').innerHTML=`<div class="card"><div class="row3"><div class="field"><label>Department *</label><select id="f-dept" onchange="refreshRouting()">${deps.map(d=>`<option>${d}</option>`).join('')}</select></div><div class="field"><label>Sub-category *</label><select id="f-sub"></select><div class="hint">Select request type within the department</div></div><div class="field"><label>Ticket Type *</label><select id="f-type">${TYPES.map(x=>`<option>${x}</option>`).join('')}</select><div class="hint">Select the purpose of this request</div></div></div><div class="row"><div class="field"><label>Ticket Title *</label><input id="f-title" placeholder="Example: Succession Plan Review for XYZ Group"></div><div class="field"><label>Expected Output *</label><textarea id="f-output" placeholder="What output do you expect from PIC?"></textarea></div></div><div class="field"><label>Description *</label><textarea id="f-desc" placeholder="Explain context, background, and what support is needed."></textarea></div><div class="row"><div class="field"><label>Priority *</label><select id="f-prio" onchange="refreshRouting()"><option>Normal</option><option>High</option><option>Critical</option><option>Low</option></select></div><div class="field"><label>Target Date *</label><input type="date" id="f-target"></div></div><div class="pic-cards"><div class="pic-card"><b>Auto Assigned PIC</b><div id="pic-main"></div></div><div class="pic-card"><b>Backup PIC</b><div id="pic-backup"></div></div></div><div class="info-strip"><div class="info-item"><div class="info-label">Data Owner</div><div class="info-value" id="info-owner"></div></div><div class="info-item"><div class="info-label">Assigned Team</div><div class="info-value" id="info-steward"></div></div><div class="info-item"><div class="info-label">Support</div><div class="info-value" id="info-custodian"></div></div><div class="info-item"><div class="info-label">SLA Reminder</div><div class="info-value" id="info-sla"></div></div></div><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn" onclick="showPage('dashboard')">Cancel</button><button class="btn btn-blue" onclick="submitTicket()">✈ Submit Ticket</button></div></div>`;refreshRouting();}
function refreshRouting(){let dep=document.getElementById('f-dept')?.value||Object.keys(DEPARTMENTS)[0];let r=DEPARTMENTS[dep];let sub=document.getElementById('f-sub'); if(sub){let cur=sub.value;sub.innerHTML=r.subs.map(s=>`<option>${s}</option>`).join(''); if(r.subs.includes(cur))sub.value=cur;} let pr=document.getElementById('f-prio')?.value||'Normal'; if(document.getElementById('pic-main')){document.getElementById('pic-main').innerHTML=`👤 ${r.pic}<br><span class="hint">${r.team}</span>`;document.getElementById('pic-backup').innerHTML=`👤 ${r.backup}<br><span class="hint">Backup - ${r.team}</span>`;document.getElementById('info-owner').textContent=r.owner;document.getElementById('info-steward').textContent=r.team;document.getElementById('info-custodian').textContent=r.custodian;document.getElementById('info-sla').textContent=`${PRIORITY_SLA[pr]} days (${pr} Priority)`;}}
function submitTicket(){let dep=v('f-dept'), r=DEPARTMENTS[dep], title=v('f-title').trim(), desc=v('f-desc').trim(), out=v('f-output').trim(), target=v('f-target'); if(!title||!desc||!out||!target){toast('Please complete title, description, expected output, and target date.');return} let id='HRC-2026-'+String(state.next++).padStart(3,'0');let today=new Date().toISOString().slice(0,10);let t={id,requester:state.user.email,requesterName:state.user.name,department:dep,sub:v('f-sub'),type:v('f-type'),title,description:desc,expected:out,priority:v('f-prio'),target,pic:r.pic,backup:r.backup,team:r.team,status:'waiting',created:today,updated:today,notes:[{by:state.user.name,text:'Ticket submitted and routed to '+r.team+'.',time:today}]};state.tickets.push(t);save();toast('Ticket '+id+' submitted.');showPage('dashboard');}
function showDetail(id){let t=state.tickets.find(x=>x.id===id);if(!t)return;setTitle('Ticket Detail',t.id+' · '+t.title);let canPic=state.user.role.startsWith('PIC')||state.user.role==='Admin HR';document.getElementById('page-detail').innerHTML=`<div class="detail-grid"><div class="card"><div class="section-head"><div><div class="ticket-id">${t.id}</div><h3>${t.title}</h3><p class="ticket-meta">${t.department} · ${t.sub} · ${t.type}</p></div><span class="badge ${STATUS_CLASS[t.status]}">${STATUS_LABEL[t.status]}</span></div><p style="line-height:1.65;margin:14px 0">${t.description}</p><div class="info-strip" style="grid-template-columns:1fr 1fr"><div class="info-item"><div class="info-label">Expected Output</div><div class="info-value">${t.expected}</div></div><div class="info-item"><div class="info-label">Target Date</div><div class="info-value">${fmt(t.target)} · ${t.priority}</div></div></div><div class="actions">${canPic?`<button class="btn btn-green" onclick="updateStatus('${t.id}','progress')">In Progress</button><button class="btn btn-orange" onclick="updateStatus('${t.id}','clarification')">Need Clarification</button><button class="btn btn-blue" onclick="updateStatus('${t.id}','completed')">Completed</button><button class="btn" onclick="updateStatus('${t.id}','closed')">Closed</button>`:''}<button class="btn" onclick="showPage('dashboard')">Back</button></div></div><div class="card"><h3 style="margin-bottom:14px">Ownership</h3><p><b>Assigned Team:</b><br>${t.team}</p><br><p><b>PIC:</b><br>${t.pic}</p><br><p><b>Backup:</b><br>${t.backup}</p><br><h3 style="margin-bottom:14px">Timeline</h3><div class="timeline">${t.notes.map(n=>`<div class="tl"><b>${n.by}</b><br>${n.text}<div class="tl-time">${fmt(n.time)}</div></div>`).join('')}</div></div></div>`;showPage('detail');}
function updateStatus(id,status){let t=state.tickets.find(x=>x.id===id);let today=new Date().toISOString().slice(0,10);t.status=status;t.updated=today;t.notes.push({by:state.user.name,text:'Status updated to '+STATUS_LABEL[status]+'.',time:today});save();toast('Status updated.');showDetail(id);}
function renderAdmin(){setTitle('Admin Console','View all tickets and monitor routing accountability.');let list=state.tickets;document.getElementById('page-admin').innerHTML=`${renderStats(list)}<div class="card"><div class="section-head"><h3>All Tickets</h3><button class="btn btn-blue" onclick="showPage('new')">+ New Ticket</button></div>${ticketList(list)}</div><div class="card"><h3 style="margin-bottom:12px">Routing Matrix Preview</h3><table class="table"><tr><th>Department</th><th>Default PIC</th><th>Backup PIC</th><th>Sub-categories</th></tr>${Object.entries(DEPARTMENTS).map(([d,r])=>`<tr><td><b>${d}</b></td><td>${r.pic}</td><td>${r.backup}</td><td>${r.subs.join('; ')}</td></tr>`).join('')}</table></div>`;}
function renderManagement(){setTitle('Management Dashboard','Aggregate visibility across Corporate HR collaboration.');let list=state.tickets;let byDept={};list.forEach(t=>byDept[t.department]=(byDept[t.department]||0)+1);document.getElementById('page-management').innerHTML=`${renderStats(list)}<div class="row"><div class="card"><h3 style="margin-bottom:12px">Tickets by Department</h3><table class="table">${Object.entries(byDept).map(([d,n])=>`<tr><td>${d}</td><td><b>${n}</b></td></tr>`).join('')}</table></div><div class="card"><h3 style="margin-bottom:12px">Overdue Tickets</h3>${ticketList(list.filter(t=>t.status==='overdue'))}</div></div><div class="card"><h3 style="margin-bottom:12px">PIC Workload</h3><table class="table"><tr><th>PIC</th><th>Assigned Tickets</th></tr>${Object.values(DEPARTMENTS).map(r=>`<tr><td>${r.team}<br><span class="hint">${r.pic}</span></td><td><b>${list.filter(t=>t.pic===r.pic).length}</b></td></tr>`).join('')}</table></div>`;}
function v(id){return document.getElementById(id).value} function fmt(s){if(!s)return'-';try{return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return s}}
load(); if(state.user){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');renderShell();showPage(state.user.role==='Management'?'management':state.user.role==='Admin HR'?'admin':'dashboard');}
</script>
</body>
</html>
